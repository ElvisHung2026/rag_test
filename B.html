<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA 世界盃 即時戰績</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
  border-bottom: 2px solid #c8a94f;
  padding: 18px 20px 12px;
  text-align: center;
}
header .wc-label { font-size: 0.75rem; letter-spacing: 3px; color: #c8a94f; text-transform: uppercase; }
header h1 {
  font-size: 1.6rem; font-weight: 900; margin: 4px 0;
  background: linear-gradient(90deg, #c8a94f, #fff, #c8a94f);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header .sub { font-size: 0.8rem; color: #8b949e; }
#clock { font-size: 0.78rem; color: #c8a94f; margin-top: 6px; }
#api-note { font-size: 0.75rem; color: #58a6ff; margin-top: 4px; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
.section-title {
  font-size: 0.8rem; color: #8b949e; letter-spacing: 2px; text-transform: uppercase;
  margin: 20px 0 10px; border-bottom: 1px solid #30363d; padding-bottom: 6px;
}
.match-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 14px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.match-card.live { border-color: #3fb950; }
.status { font-size: 0.72rem; font-weight: bold; min-width: 60px; text-align: center; color: #8b949e; }
.status.live-status { color: #3fb950; animation: pulse 1.5s infinite; }
.status.upcoming { color: #58a6ff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.teams { flex: 1; display: flex; align-items: center; gap: 8px; }
.team { display: flex; align-items: center; gap: 6px; flex: 1; }
.team.right { flex-direction: row-reverse; text-align: right; }
.team .name { font-size: 0.9rem; font-weight: 600; }
.score-box {
  display: flex; align-items: center; gap: 6px;
  background: #0d1117; border-radius: 6px; padding: 4px 10px;
  font-size: 1.2rem; font-weight: 900; min-width: 70px; justify-content: center;
}
.score-sep { color: #8b949e; font-size: 0.9rem; }
.venue { font-size: 0.7rem; color: #8b949e; min-width: 100px; text-align: right; }
#loading { text-align: center; padding: 40px; color: #8b949e; font-size: 0.9rem; display: none; }
#error-msg {
  background: #2d1b1b; border: 1px solid #f85149; border-radius: 8px;
  padding: 16px; color: #f85149; text-align: center; margin: 20px 0; display: none;
}
.api-key-form {
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 20px; margin: 20px 0; text-align: center;
}
.api-key-form h3 { color: #c8a94f; margin-bottom: 12px; font-size: 1rem; }
.api-key-form p { font-size: 0.82rem; color: #8b949e; margin-bottom: 14px; line-height: 1.6; }
.api-key-form input {
  background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
  color: #e6edf3; padding: 8px 14px; font-size: 0.85rem;
  width: 300px; max-width: 100%; margin-right: 8px;
}
.api-key-form button {
  background: #c8a94f; border: none; border-radius: 6px;
  color: #0d1117; padding: 8px 18px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
}
.api-key-form button:hover { background: #e0c070; }
.refresh-btn {
  display: block; margin: 0 auto 16px;
  background: #21262d; border: 1px solid #30363d; border-radius: 6px;
  color: #c8a94f; padding: 7px 20px; font-size: 0.82rem; cursor: pointer;
}
.refresh-btn:hover { background: #30363d; }
.matchday-badge {
  background: #1f2937; border-radius: 4px; padding: 2px 8px;
  font-size: 0.7rem; color: #58a6ff; margin-left: 4px;
}
</style>
</head>
<body>
<header>
  <div class="wc-label">FIFA World Cup 2026</div>
  <h1>世界盃即時戰績</h1>
  <div class="sub">USA / Canada / Mexico &nbsp;|&nbsp; Jun 11 – Jul 19, 2026</div>
  <div id="clock"></div>
  <div id="api-note">資料來源：football-data.org API（即時更新）</div>
</header>

<div class="container">
  <div class="api-key-form" id="keyForm">
    <h3>🔑 輸入 API 金鑰</h3>
    <p>
      請前往 <a href="https://www.football-data.org/client/register" target="_blank" style="color:#58a6ff">football-data.org</a> 免費註冊取得 API Token，<br>
      再貼入下方即可即時載入 2026 世界盃賽事資料。
    </p>
    <input type="text" id="apiKeyInput" placeholder="貼上您的 API Token" />
    <button onclick="saveKeyAndLoad()">載入賽事</button>
  </div>
  <div id="error-msg"></div>
  <div id="loading">⏳ 載入賽事資料中...</div>
  <button class="refresh-btn" id="refreshBtn" style="display:none" onclick="loadMatches()">🔄 重新整理</button>
  <div id="matches-container"></div>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

let API_KEY = localStorage.getItem('fdorg_api_key') || 'a57f5ae0a3a144028b0681e620ac1999';
document.getElementById('keyForm').style.display = 'none';
if (API_KEY) {
  loadMatches();
}

function saveKeyAndLoad() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val) { alert('請輸入 API Token'); return; }
  API_KEY = val;
  localStorage.setItem('fdorg_api_key', val);
  document.getElementById('keyForm').style.display = 'none';
  loadMatches();
}

function resetKey() {
  localStorage.removeItem('fdorg_api_key');
  API_KEY = '';
  document.getElementById('keyForm').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}

function statusLabel(match) {
  const s = match.status;
  if (['LIVE','IN_PLAY','PAUSED'].includes(s)) {
    const min = match.minute ? match.minute + "'" : 'LIVE';
    return { text: min, cls: 'live-status', live: true };
  }
  if (s === 'FINISHED') return { text: 'FT', cls: '', live: false };
  if (s === 'SCHEDULED' || s === 'TIMED') {
    const d = new Date(match.utcDate);
    const t = d.toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
    return { text: t, cls: 'upcoming', live: false };
  }
  return { text: s, cls: '', live: false };
}

function flagEmoji(code) {
  if (!code || code.length !== 3) return '';
  const map = {
    ARG:'AR',BRA:'BR',FRA:'FR',GER:'DE',ENG:'GB',ESP:'ES',ITA:'IT',POR:'PT',
    NED:'NL',BEL:'BE',CRO:'HR',URU:'UY',MEX:'MX',USA:'US',CAN:'CA',
    JPN:'JP',KOR:'KR',AUS:'AU',MAR:'MA',SEN:'SN',GHA:'GH',CMR:'CM',
    NGA:'NG',TUN:'TN',EGY:'EG',COL:'CO',PER:'PE',ECU:'EC',
    SAU:'SA',IRN:'IR',QAT:'QA',POL:'PL',SUI:'CH',AUT:'AT',
    CZE:'CZ',DEN:'DK',SWE:'SE',NOR:'NO',TUR:'TR',GRE:'GR',
    UKR:'UA',SVN:'SI',CRC:'CR',HON:'HN',PAN:'PA',NZL:'NZ',
    CHN:'CN',IND:'IN',THA:'TH',IDN:'ID',
  };
  const a2 = map[code];
  if (!a2) return '';
  const offset = 127397;
  return String.fromCodePoint(...[...a2].map(c => c.charCodeAt(0) + offset));
}

async function loadMatches() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('matches-container').innerHTML = '';
  document.getElementById('refreshBtn').style.display = 'none';
  try {
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches?season=2026', {
      headers: { 'X-Auth-Token': API_KEY }
    });
    if (res.status === 401) throw new Error('API Token 無效。<a href="#" onclick="resetKey();return false;">重新輸入</a>');
    if (res.status === 403) throw new Error('此 API 方案不支援世界盃資料，請升級方案或確認設定。');
    if (!res.ok) throw new Error('API 錯誤：' + res.status);
    const data = await res.json();
    const matches = data.matches || [];
    if (matches.length === 0) throw new Error('目前無賽事資料。');
    renderMatches(matches);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('refreshBtn').style.display = 'block';
    setTimeout(loadMatches, 60000);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.style.display = 'block';
    err.innerHTML = '⚠️ ' + e.message;
    document.getElementById('refreshBtn').style.display = 'block';
  }
}

function renderMatches(matches) {
  const container = document.getElementById('matches-container');
  container.innerHTML = '';
  const today = new Date().toISOString().slice(0,10);
  const live = matches.filter(m => ['LIVE','IN_PLAY','PAUSED'].includes(m.status));
  const todayM = matches.filter(m => ['SCHEDULED','TIMED'].includes(m.status) && m.utcDate.slice(0,10) === today);
  const upcoming = matches.filter(m => ['SCHEDULED','TIMED'].includes(m.status) && m.utcDate.slice(0,10) > today).slice(0, 20);
  const finished = matches.filter(m => m.status === 'FINISHED').reverse().slice(0, 10);

  if (live.length) { container.innerHTML += '<div class="section-title">🔴 進行中</div>'; live.forEach(m => container.appendChild(buildCard(m))); }
  if (todayM.length) { container.innerHTML += '<div class="section-title">📅 今日賽事</div>'; todayM.forEach(m => container.appendChild(buildCard(m))); }
  if (upcoming.length) { container.innerHTML += '<div class="section-title">🗓 即將到來</div>'; upcoming.forEach(m => container.appendChild(buildCard(m))); }
  if (finished.length) { container.innerHTML += '<div class="section-title">✅ 最近結果</div>'; finished.forEach(m => container.appendChild(buildCard(m))); }
}

function buildCard(match) {
  const sl = statusLabel(match);
  const home = match.homeTeam;
  const away = match.awayTeam;
  const score = match.score;
  const hScore = score?.fullTime?.home ?? '-';
  const aScore = score?.fullTime?.away ?? '-';
  const matchDate = new Date(match.utcDate).toLocaleDateString('zh-TW', { timeZone:'Asia/Taipei', month:'numeric', day:'numeric' });
  const md = match.matchday ? '<span class="matchday-badge">第' + match.matchday + '輪</span>' : '';
  const card = document.createElement('div');
  card.className = 'match-card' + (sl.live ? ' live' : '');
  card.innerHTML =
    '<div class="status ' + sl.cls + '">' + sl.text + '<br><span style="font-size:0.65rem;color:#8b949e">' + matchDate + '</span></div>' +
    '<div class="teams">' +
      '<div class="team"><span class="name">' + flagEmoji(home.tla) + ' ' + (home.shortName || home.name) + '</span></div>' +
      '<div class="score-box"><span>' + hScore + '</span><span class="score-sep">:</span><span>' + aScore + '</span></div>' +
      '<div class="team right"><span class="name">' + (away.shortName || away.name) + ' ' + flagEmoji(away.tla) + '</span></div>' +
    '</div>' +
    '<div class="venue">' + (match.group || '') + md + '</div>';
  return card;
}
</script>
</body>
</html>
