<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA 世界盃 即時戰績</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: #0d1117; color: #e6edf3; min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%);
  border-bottom: 2px solid #c8a94f;
  padding: 18px 20px 12px; text-align: center;
}
header .wc-label { font-size: 0.75rem; letter-spacing: 3px; color: #c8a94f; text-transform: uppercase; }
header h1 {
  font-size: 1.6rem; font-weight: 900; margin: 4px 0;
  background: linear-gradient(90deg, #c8a94f, #fff, #c8a94f);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
header .sub { font-size: 0.8rem; color: #8b949e; }
#clock { font-size: 0.78rem; color: #c8a94f; margin-top: 6px; }
#api-note { font-size: 0.72rem; color: #58a6ff; margin-top: 3px; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
.section-title {
  font-size: 0.8rem; color: #8b949e; letter-spacing: 2px; text-transform: uppercase;
  margin: 20px 0 10px; border-bottom: 1px solid #30363d; padding-bottom: 6px;
}
.match-card {
  background: #161b22; border: 1px solid #30363d; border-radius: 10px;
  padding: 14px 18px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
}
.match-card.live { border-color: #3fb950; }
.status { font-size: 0.72rem; font-weight: bold; min-width: 58px; text-align: center; color: #8b949e; }
.status.live-status { color: #3fb950; animation: pulse 1.5s infinite; }
.status.upcoming { color: #58a6ff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.teams { flex: 1; display: flex; align-items: center; gap: 8px; }
.team { display: flex; align-items: center; gap: 6px; flex: 1; }
.team.right { flex-direction: row-reverse; text-align: right; }
.team .name { font-size: 0.88rem; font-weight: 600; }
.team img { width: 24px; height: 24px; object-fit: contain; }
.score-box {
  display: flex; align-items: center; gap: 6px;
  background: #0d1117; border-radius: 6px; padding: 4px 10px;
  font-size: 1.2rem; font-weight: 900; min-width: 70px; justify-content: center;
}
.score-sep { color: #8b949e; font-size: 0.9rem; }
.info-col { font-size: 0.68rem; color: #8b949e; min-width: 90px; text-align: right; line-height: 1.5; }
#loading { text-align: center; padding: 40px; color: #8b949e; font-size: 0.9rem; }
#error-msg {
  background: #2d1b1b; border: 1px solid #f85149; border-radius: 8px;
  padding: 16px; color: #f85149; text-align: center; margin: 20px 0; display: none;
}
.refresh-btn {
  display: block; margin: 0 auto 16px;
  background: #21262d; border: 1px solid #30363d; border-radius: 6px;
  color: #c8a94f; padding: 7px 20px; font-size: 0.82rem; cursor: pointer;
}
.refresh-btn:hover { background: #30363d; }
#last-updated { text-align: center; font-size: 0.7rem; color: #8b949e; margin-bottom: 8px; }
</style>
</head>
<body>
<header>
  <div class="wc-label">FIFA World Cup 2026</div>
  <h1>世界盃即時戰績</h1>
  <div class="sub">USA / Canada / Mexico &nbsp;|&nbsp; Jun 11 – Jul 19, 2026</div>
  <div id="clock"></div>
  <div id="api-note">資料來源：TheSportsDB API（每60秒自動更新）</div>
</header>

<div class="container">
  <div id="error-msg"></div>
  <div id="loading">⏳ 載入賽事資料中...</div>
  <div id="last-updated"></div>
  <button class="refresh-btn" id="refreshBtn" style="display:none" onclick="loadMatches()">🔄 重新整理</button>
  <div id="matches-container"></div>
</div>

<script>
// Clock
function updateClock() {
  document.getElementById('clock').textContent =
    new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// TheSportsDB League ID for FIFA World Cup 2026
// League ID 4483 = FIFA World Cup, season 2025-2026
const LEAGUE_ID = '4429';
const BASE = 'https://www.thesportsdb.com/api/v1/json/3';

let autoRefreshTimer = null;

async function loadMatches() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('matches-container').innerHTML = '';
  document.getElementById('refreshBtn').style.display = 'none';
  if (autoRefreshTimer) clearTimeout(autoRefreshTimer);

  try {
    // Fetch next 15 events
    const res = await fetch(BASE + '/eventsseason.php?id=' + LEAGUE_ID + '&s=2026');

    if (!res.ok) throw new Error('API 回應錯誤：' + res.status);

    const data = await res.json();
    const allMatches = data.events || [];

    if (allMatches.length === 0) {
      throw new Error('目前沒有賽事資料，請稍後再試。');
    }

    // Sort by date
    allMatches.sort((a, b) => new Date(a.dateEvent + 'T' + (a.strTime || '00:00:00')) - new Date(b.dateEvent + 'T' + (b.strTime || '00:00:00')));

    const live = allMatches.filter(m => ['Live','1H','2H','HT','ET','PEN'].includes(m.strStatus));
    const upcoming = allMatches.filter(m => m.strStatus === 'NS');
    const finished = allMatches.filter(m => m.strStatus === 'FT' || m.strStatus === 'AET' || m.strStatus === 'PEN').reverse().slice(0, 15);

    renderMatchesByType(live, upcoming, finished);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('refreshBtn').style.display = 'block';
    document.getElementById('last-updated').textContent =
      '最後更新：' + new Date().toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });

    autoRefreshTimer = setTimeout(loadMatches, 60000);

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.style.display = 'block';
    err.innerHTML = '⚠️ ' + e.message;
    document.getElementById('refreshBtn').style.display = 'block';
  }
}

function renderMatchesByType(live, upcoming, finished) {
  const container = document.getElementById('matches-container');
  container.innerHTML = '';

  if (live.length > 0) {
    container.innerHTML += '<div class="section-title">🔴 進行中</div>';
    live.forEach(m => container.appendChild(buildCard(m, 'live')));
  }
  if (upcoming.length > 0) {
    container.innerHTML += '<div class="section-title">🗓 賽程表（共' + upcoming.length + '場）</div>';
    upcoming.slice(0, 20).forEach(m => container.appendChild(buildCard(m, 'upcoming')));
  }
  if (finished.length > 0) {
    container.innerHTML += '<div class="section-title">✅ 最近結果（最新15場）</div>';
    finished.forEach(m => container.appendChild(buildCard(m, 'finished')));
  }
}

function buildCard(m, type) {
  const card = document.createElement('div');
  card.className = 'match-card' + (type === 'live' ? ' live' : '');

  let statusText = '', statusCls = '';
  if (type === 'live') {
    statusText = m.strStatus || 'LIVE';
    statusCls = 'live-status';
  } else if (type === 'upcoming') {
    const d = new Date(m.strTimestamp || (m.dateEvent + 'T' + (m.strTime || '00:00:00') + 'Z'));
    statusText = d.toLocaleTimeString('zh-TW', { timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', hour12: false });
    statusCls = 'upcoming';
  } else {
    statusText = 'FT';
    statusCls = '';
  }

  const dateStr = m.dateEvent ? new Date(m.dateEvent).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' }) : '';
  const homeScore = m.intHomeScore !== null && m.intHomeScore !== undefined && m.intHomeScore !== '' ? m.intHomeScore : '-';
  const awayScore = m.intAwayScore !== null && m.intAwayScore !== undefined && m.intAwayScore !== '' ? m.intAwayScore : '-';
  const homeBadge = m.strHomeTeamBadge ? '<img src="' + m.strHomeTeamBadge + '/tiny" onerror="this.style.display='none'" alt="">' : '';
  const awayBadge = m.strAwayTeamBadge ? '<img src="' + m.strAwayTeamBadge + '/tiny" onerror="this.style.display='none'" alt="">' : '';
  const round = m.intRound ? '第' + m.intRound + '輪' : (m.strGroup || '');

  card.innerHTML =
    '<div class="status ' + statusCls + '">' + statusText + '<br><span style="font-size:0.62rem;color:#8b949e">' + dateStr + '</span></div>' +
    '<div class="teams">' +
      '<div class="team">' + homeBadge + '<span class="name">' + (m.strHomeTeam || '') + '</span></div>' +
      '<div class="score-box"><span>' + homeScore + '</span><span class="score-sep">:</span><span>' + awayScore + '</span></div>' +
      '<div class="team right"><span class="name">' + (m.strAwayTeam || '') + '</span>' + awayBadge + '</div>' +
    '</div>' +
    '<div class="info-col">' + round + '<br>' + (m.strVenue || '') + '</div>';

  return card;
}

loadMatches();
</script>
</body>
</html>
