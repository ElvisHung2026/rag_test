<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台北即時天氣</title>
<style>
  body {
    font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(135deg, #74ABE2, #5563DE);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    padding: 32px 40px;
    text-align: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    min-width: 300px;
  }
  h1 {
    margin-top: 0;
    font-size: 1.5rem;
  }
  .temp {
    font-size: 3rem;
    font-weight: bold;
    margin: 12px 0;
  }
  .info {
    font-size: 1rem;
    line-height: 1.6;
  }
  .updated {
    margin-top: 16px;
    font-size: 0.8rem;
    opacity: 0.8;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>台北市 即時天氣</h1>
    <div id="weather">
      <p>讀取中...</p>
    </div>
    <div class="updated" id="updated"></div>
  </div>

<script>
  const lat = 25.0330;
  const lon = 121.5654;
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Asia%2FTaipei`;

  const weatherCodeMap = {
    0: "晴朗",
    1: "大致晴朗",
    2: "局部多雲",
    3: "多雲",
    45: "有霧",
    48: "霧淞",
    51: "毛毛雨（小）",
    53: "毛毛雨（中）",
    55: "毛毛雨（大）",
    61: "陣雨（小）",
    63: "陣雨（中）",
    65: "陣雨（大）",
    71: "小雪",
    73: "中雪",
    75: "大雪",
    80: "驟雨（小）",
    81: "驟雨（中）",
    82: "驟雨（強）",
    95: "雷雨",
    96: "雷雨夾冰雹",
    99: "強烈雷雨夾冰雹"
  };

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const w = data.current_weather;
      const desc = weatherCodeMap[w.weathercode] || "未知天氣狀況";
      document.getElementById("weather").innerHTML = `
        <div class="temp">${w.temperature}°C</div>
        <div class="info">
          天氣狀況：${desc}<br>
          風速：${w.windspeed} km/h<br>
          風向：${w.winddirection}°
        </div>
      `;
      document.getElementById("updated").textContent =
        "資料時間：" + w.time.replace("T", " ");
    })
    .catch(err => {
      document.getElementById("weather").innerHTML =
        "<p>無法取得天氣資料，請稍後再試。</p>";
      console.error(err);
    });
</script>
</body>
</html>
